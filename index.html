<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transposición de Acordes</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    h1 {
      text-align: center;
      color: #5f6368;
      margin: 0;
    }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-top: 10px;
    }
    .controls button {
      font-size: 1.5em;
      width: 45px;
      height: 45px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .controls button:hover {
      background-color: #45a049;
    }
    .controls span {
      font-size: 1.2em;
      font-weight: bold;
      min-width: 130px;
      text-align: center;
    }
    .text-area-wrapper {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .box {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
    }
    label, h3 {
      font-size: 1.1em;
      margin-bottom: 10px;
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 400px;
      font-family: monospace;
      font-size: 1.1em;
      padding: 10px;
      box-sizing: border-box;
      white-space: pre-wrap;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    #result {
      background-color: #f9f9f9;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Transposición de Acordes</h1>

    <div class="controls">
      <button onclick="change(-1)">−</button>
      <span id="step-display">0 semitonos</span>
      <button onclick="change(1)">+</button>
    </div>

    <div class="text-area-wrapper">
      <div class="box">
        <label for="input">Pega tus acordes (respetamos el formato):</label>
        <textarea id="input" placeholder="Ej: do   sol\nlam  fa#m7"></textarea>
      </div>

      <div class="box">
        <h3>Resultado:</h3>
        <textarea id="result" readonly></textarea>
      </div>
    </div>
  </div>

  <script>
    const notasLatinas = ['do','do#','re','re#','mi','fa','fa#','sol','sol#','la','la#','si'];
    const notasAmericanas = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    let step = 0;

    const inputEl = document.getElementById('input');
    const resultEl = document.getElementById('result');
    const stepDisplay = document.getElementById('step-display');

    // Mantiene la fluidez: actualiza mientras escribís
    inputEl.addEventListener('input', transport);

    function change(delta) {
      step += delta;
      const sign = step > 0 ? '+' : '';
      stepDisplay.textContent = `${sign}${step} semitono${Math.abs(step) !== 1 ? 's' : ''}`;
      transport();
    }

    function transport() {
      resultEl.value = getTransportedText(inputEl.value);
    }

    function getTransportedText(inputText) {
      // Volvemos a TU expresión regular original, es más segura para que no rompa palabras raras
      const regex = /\b((do#?|re#?|mi|fa#?|sol#?|la#?|si|C#?|D#?|E|F#?|G#?|A#?|B))([^ \n\r\t/()]*)(\/(do#?|re#?|mi|fa#?|sol#?|la#?|si|C#?|D#?|E|F#?|G#?|A#?|B))?(\([^\)]*\))?/gi;

      return inputText.replace(regex, (match, base, _, sufijo, slash, bajo, paren) => {
        
        function transp(nota) {
          const isLatina = /^[dD][oO]|^[rR]e|^[mM]i|^fa|^sol|^la|^si/i.test(nota);
          const lista = isLatina ? notasLatinas : notasAmericanas;
          const normalizada = nota.charAt(0).toUpperCase() + nota.slice(1).toLowerCase();
          const i = lista.findIndex(n => n.toLowerCase() === normalizada.toLowerCase());
          
          if (i === -1) return nota;
          
          // La matemática arreglada para que no explote si bajas muchos semitonos
          const newIndex = (((i + step) % 12) + 12) % 12;
          let resultado = lista[newIndex];

          // Respetar tus mayúsculas/minúsculas exactamente como las escribiste
          if (nota === nota.toUpperCase()) {
            return resultado.toUpperCase();
          } else if (nota[0] === nota[0].toUpperCase()) {
            return resultado.charAt(0).toUpperCase() + resultado.slice(1);
          }
          return resultado;
        }

        const acordeTransp = transp(base) + (sufijo || '');
        const bajoTransp = slash ? '/' + transp(bajo) : '';
        return acordeTransp + bajoTransp + (paren || '');
      });
    }
  </script>
</body>
</html>
