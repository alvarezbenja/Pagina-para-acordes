### 2. Agrega la función de extracción en el JavaScript
Pega esta nueva función al final de tu etiqueta `<script>`. Lo que hace es recorrer todo lo que pegaste y separar la paja del trigo usando matemáticas simples:

```javascript
  // Nueva función para separar letra de acordes
  function extraer(tipo) {
    const inputText = inputEl.value;
    const lineas = inputText.split('\n'); // Separamos el texto renglón por renglón
    const resultado = [];

    // Usamos la misma regex poderosa que ya teníamos
    const chordRegex = /\b((do|re|mi|fa|sol|la|si|c|d|e|f|g|a|b)[#b]?)([^ \n\r\t/()]*)(\/((do|re|mi|fa|sol|la|si|c|d|e|f|g|a|b)[#b]?))?(\([^\)]*\))?/gi;

    lineas.forEach(linea => {
      const lineaLimpia = linea.trim();
      
      // Si es un renglón en blanco, lo conservamos para mantener la estructura visual (párrafos)
      if (lineaLimpia === '') {
        resultado.push('');
        return;
      }

      // TRUCO: Le quitamos a la línea todos los acordes válidos y todos los espacios.
      const textoSinAcordes = linea.replace(chordRegex, '').replace(/\s+/g, '');
      
      // Calculamos cuánto texto "no-acorde" quedó. 
      // Si quedó menos del 30% del texto original, asumimos que era una línea de acordes.
      const longitudOriginalSinEspacios = linea.replace(/\s+/g, '').length;
      const esLineaDeAcordes = textoSinAcordes.length < (longitudOriginalSinEspacios * 0.3);

      // Filtramos según lo que pidió el usuario
      if (tipo === 'acordes' && esLineaDeAcordes) {
        // Transponemos la línea de acordes por si hay semitonos aplicados, y la guardamos
        resultado.push(getTransportedText(linea));
      } else if (tipo === 'letra' && !esLineaDeAcordes) {
        // Guardamos solo la letra pura
        resultado.push(linea);
      }
    });

    // Mostramos el resultado en el cuadro de la derecha
    resultEl.value = resultado.join('\n');
  }

  <script>
  // Se unificó todo en la escala cromática con sostenidos como base matemática
  const cromaticasLatinas = ['do','do#','re','re#','mi','fa','fa#','sol','sol#','la','la#','si'];
  const cromaticasAmericanas = ['c','c#','d','d#','e','f','f#','g','g#','a','a#','b'];
  
  // Diccionario para manejar bemoles (b) y pasarlos a la lógica de sostenidos
  const flatToSharp = {
    'reb': 'do#', 'mib': 're#', 'solb': 'fa#', 'lab': 'sol#', 'sib': 'la#',
    'db': 'c#', 'eb': 'd#', 'gb': 'f#', 'ab': 'g#', 'bb': 'a#'
  };

  let step = 0;
  const inputEl = document.getElementById('input');
  const resultEl = document.getElementById('result');
  const stepDisplay = document.getElementById('step-display');

  inputEl.addEventListener('input', transport);

  function change(delta) {
    step += delta;
    const sign = step > 0 ? '+' : '';
    stepDisplay.textContent = `${sign}${step} semitono${Math.abs(step) !== 1 ? 's' : ''}`;
    transport();
  }

  function transport() {
    resultEl.value = getTransportedText(inputEl.value);
  }

  function getTransportedText(inputText) {
    // La regex ahora agrupa específicamente la "nota pura" (sin # o b) en los grupos 2 y 6
    const regex = /\b((do|re|mi|fa|sol|la|si|c|d|e|f|g|a|b)[#b]?)([^ \n\r\t/()]*)(\/((do|re|mi|fa|sol|la|si|c|d|e|f|g|a|b)[#b]?))?(\([^\)]*\))?/gi;

    // Usamos los grupos capturados para aislar exactamente qué capitalizó el usuario
    return inputText.replace(regex, (match, base, notaPura, sufijo, slashGroup, bajo, bajoPura, paren) => {
      
      function transp(nota, pura) {
        if (!nota) return '';
        
        let notaMin = nota.toLowerCase();
        if (flatToSharp[notaMin]) {
          notaMin = flatToSharp[notaMin];
        }

        const isLatina = /^(do|re|mi|fa|sol|la|si)/.test(notaMin);
        const lista = isLatina ? cromaticasLatinas : cromaticasAmericanas;
        
        const i = lista.indexOf(notaMin);
        if (i === -1) return nota; 

        // Cálculo matemático a prueba de números negativos
        const newIndex = (((i + step) % 12) + 12) % 12;
        let resultado = lista[newIndex];

        // LÓGICA EXACTA DE CAPITALIZACIÓN BASADA EN LA NOTA PURA
        const esMayusculaCerrada = pura === pura.toUpperCase();
        const esTipoTitulo = pura[0] === pura[0].toUpperCase();

        if (esMayusculaCerrada) {
          return resultado.toUpperCase(); // Ej: DO -> RE, SIB -> LA#
        } else if (esTipoTitulo) {
          return resultado.charAt(0).toUpperCase() + resultado.slice(1); // Ej: Do -> Re, Sib -> La#
        }
        return resultado; // Ej: do -> re
      }

      // El sufijo (m, maj7, dim, etc) se añade intacto al final del cálculo
      const acordeTransp = transp(base, notaPura) + (sufijo || '');
      const bajoTransp = slashGroup ? '/' + transp(bajo, bajoPura) : '';
      return acordeTransp + bajoTransp + (paren || '');
    });
  }
</script>
