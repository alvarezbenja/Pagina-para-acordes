<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transposición y Extracción de Acordes</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      background-color: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-top: 0;
      margin-bottom: 5px;
    }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      background-color: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
    }
    .controls button {
      font-size: 1.5em;
      width: 45px;
      height: 45px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .controls button.action-btn {
      width: auto;
      padding: 0 20px;
      font-size: 1.1em;
      background-color: #8e44ad;
    }
    .controls button:hover {
      filter: brightness(0.9);
    }
    .controls span {
      font-size: 1.2em;
      font-weight: bold;
      min-width: 120px;
      text-align: center;
    }
    .text-area-wrapper {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .box {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
    }
    label, h3 {
      font-size: 1.1em;
      margin-bottom: 10px;
      color: #555;
      font-weight: 600;
      margin-top: 0;
    }
    textarea {
      width: 100%;
      flex-grow: 1;
      min-height: 300px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1em;
      padding: 15px;
      box-sizing: border-box;
      white-space: pre-wrap;
      border: 1px solid #ced4da;
      border-radius: 8px;
      resize: vertical;
      background-color: #fafafa;
    }
    textarea:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
    }
    .readonly-box {
      background-color: #f8f9fa;
      cursor: not-allowed;
    }
    hr {
      border: 0;
      height: 1px;
      background: #ddd;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Herramienta para Cancionero</h1>

    <div class="controls">
      <button onclick="change(-1)">−</button>
      <span id="step-display">0 semitonos</span>
      <button onclick="change(1)">+</button>
    </div>

    <div class="text-area-wrapper">
      <div class="box">
        <label for="input">Pega tu canción aquí:</label>
        <textarea id="input" placeholder="Pega aquí la letra con los acordes arriba..."></textarea>
      </div>

      <div class="box">
        <h3>Canción Transportada:</h3>
        <textarea id="result" class="readonly-box" readonly></textarea>
      </div>
    </div>

    <hr>

    <div class="controls">
      <button class="action-btn" onclick="separarAcordesYLetra()">Separar Letra y Acordes en Columnas ↓</button>
    </div>

    <div class="text-area-wrapper">
      <div class="box">
        <h3 style="color: #e67e22;">Solo Letra:</h3>
        <textarea id="resultado-letra" class="readonly-box" readonly></textarea>
      </div>

      <div class="box">
        <h3 style="color: #27ae60;">Solo Acordes (Sincronizados):</h3>
        <textarea id="resultado-acordes" class="readonly-box" readonly></textarea>
      </div>
    </div>

  </div>

  <script>
    const cromaticasLatinas = ['do','do#','re','re#','mi','fa','fa#','sol','sol#','la','la#','si'];
    const cromaticasAmericanas = ['c','c#','d','d#','e','f','f#','g','g#','a','a#','b'];
    
    const flatToSharp = {
      'reb': 'do#', 'mib': 're#', 'solb': 'fa#', 'lab': 'sol#', 'sib': 'la#',
      'db': 'c#', 'eb': 'd#', 'gb': 'f#', 'ab': 'g#', 'bb': 'a#'
    };

    let step = 0;
    const inputEl = document.getElementById('input');
    const resultEl = document.getElementById('result');
    const stepDisplay = document.getElementById('step-display');
    const letraEl = document.getElementById('resultado-letra');
    const acordesEl = document.getElementById('resultado-acordes');

    // Se actualiza la transposición general automáticamente al escribir
    inputEl.addEventListener('input', transport);

    function change(delta) {
      step += delta;
      const sign = step > 0 ? '+' : '';
      stepDisplay.textContent = `${sign}${step} semitono${Math.abs(step) !== 1 ? 's' : ''}`;
      transport();
      
      // Si el usuario ya había separado las columnas, las actualizamos al cambiar de tono
      if(acordesEl.value !== "") {
          separarAcordesYLetra();
      }
    }

    function transport() {
      resultEl.value = getTransportedText(inputEl.value);
    }

    // La función principal de transposición manteniendo tu regla de mayúsculas
    function getTransportedText(inputText) {
      const regex = /\b((do|re|mi|fa|sol|la|si|c|d|e|f|g|a|b)[#b]?)([^ \n\r\t/()]*)(\/((do|re|mi|fa|sol|la|si|c|d|e|f|g|a|b)[#b]?))?(\([^\)]*\))?/gi;

      return inputText.replace(regex, (match, base, notaPura, sufijo, slashGroup, bajo, bajoPura, paren) => {
        
        function transp(nota, pura) {
          if (!nota) return '';
          
          let notaMin = nota.toLowerCase();
          if (flatToSharp[notaMin]) {
            notaMin = flatToSharp[notaMin];
          }

          const isLatina = /^(do|re|mi|fa|sol|la|si)/.test(notaMin);
          const lista = isLatina ? cromaticasLatinas : cromaticasAmericanas;
          
          const i = lista.indexOf(notaMin);
          if (i === -1) return nota; 

          const newIndex = (((i + step) % 12) + 12) % 12;
          let resultado = lista[newIndex];

          const esMayusculaCerrada = pura === pura.toUpperCase();
          const esTipoTitulo = pura[0] === pura[0].toUpperCase();

          if (esMayusculaCerrada) {
            return resultado.toUpperCase(); 
          } else if (esTipoTitulo) {
            return resultado.charAt(0).toUpperCase() + resultado.slice(1); 
          }
          return resultado; 
        }

        const acordeTransp = transp(base, notaPura) + (sufijo || '');
        const bajoTransp = slashGroup ? '/' + transp(bajo, bajoPura) : '';
        return acordeTransp + bajoTransp + (paren || '');
      });
    }

    // Nueva función para separar en dos cuadros manteniendo la altura de las líneas
    function separarAcordesYLetra() {
      const inputText = inputEl.value;
      const lineas = inputText.split('\n');
      
      const arrLetra = [];
      const arrAcordes = [];

      const chordRegex = /\b((do|re|mi|fa|sol|la|si|c|d|e|f|g|a|b)[#b]?)([^ \n\r\t/()]*)(\/((do|re|mi|fa|sol|la|si|c|d|e|f|g|a|b)[#b]?))?(\([^\)]*\))?/gi;

      lineas.forEach(linea => {
        const lineaLimpia = linea.trim();
        
        if (lineaLimpia === '') {
          arrLetra.push('');
          arrAcordes.push('');
          return;
        }

        const textoSinAcordes = linea.replace(chordRegex, '').replace(/\s+/g, '');
        const longitudOriginalSinEspacios = linea.replace(/\s+/g, '').length;
        // La regla del 30% para saber si la línea es de acordes
        const esLineaDeAcordes = textoSinAcordes.length < (longitudOriginalSinEspacios * 0.3);

        if (esLineaDeAcordes) {
          arrLetra.push(''); // Dejamos hueco en la letra
          arrAcordes.push(getTransportedText(linea)); // Extraemos y transponemos el acorde
        } else {
          arrLetra.push(linea); // Guardamos la letra
          arrAcordes.push('');  // Dejamos hueco en los acordes
        }
      });

      letraEl.value = arrLetra.join('\n');
      acordesEl.value = arrAcordes.join('\n');
    }
  </script>
</body>
</html>
